name: Hourly update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-edls:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt pytest

    - name: Run validator test suite
      run: python -m pytest tests/

    - name: Configure git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: Run all EDL generators
      run: |
        export PYTHONPATH=.
        : > /tmp/failed_generators.txt
        for dir in */; do
          slug="${dir%/}"
          script="${dir}${slug}.py"
          if [ -f "$script" ]; then
            echo "::group::Running $script"
            if ! python "$script"; then
              echo "$slug" >> /tmp/failed_generators.txt
              echo "::warning::Generator failed: $slug (existing output preserved)"
            fi
            echo "::endgroup::"
          fi
        done

    - name: Commit and push changed EDL files
      run: |
        # Stage all .txt files (covers both modified-tracked and new-untracked),
        # then derive the change list from what's actually staged. Generators
        # that failed earlier left their .txt untouched, so they don't appear
        # here and the last known-good content stays on main.
        git add -- '*/*.txt'

        updated=()
        for txt in $(git diff --cached --name-only -- '*/*.txt'); do
          updated+=("$(dirname "$txt")")
        done

        if [ ${#updated[@]} -eq 0 ]; then
          echo "No changes to commit"
          exit 0
        fi

        msg="Update EDL: $(IFS=', '; echo "${updated[*]}")"
        git commit -m "$msg"
        if ! git push -u origin "${GITHUB_REF_NAME}"; then
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push -u origin "${GITHUB_REF_NAME}"
        fi

    - name: Fail workflow if any generator failed
      if: always()
      run: |
        if [ -s /tmp/failed_generators.txt ]; then
          echo "::error::Generators that failed this run (existing .txt preserved):"
          sed 's/^/  - /' /tmp/failed_generators.txt
          exit 1
        fi
        echo "All generators succeeded."
