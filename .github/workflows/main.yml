name: Hourly update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-edls:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: pip install requests beautifulsoup4
    - name: Configure git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
    - name: Run Debian mirrors script
      run: python debian-mirrors/debian-mirrors.py
    - name: Run Ubuntu mirrors script
      run: python ubuntu-mirrors/ubuntu-mirrors.py
    - name: Run Docker domains script
      run: python docker-domains/docker-domains.py
    - name: Commit and push changed EDL files
      run: |
        updated=()

        if ! git diff --exit-code -- debian-mirrors/debian-mirrors.txt > /dev/null 2>&1; then
          git add debian-mirrors/debian-mirrors.txt
          updated+=("Debian mirrors")
        fi

        if ! git diff --exit-code -- ubuntu-mirrors/ubuntu-mirrors.txt > /dev/null 2>&1; then
          git add ubuntu-mirrors/ubuntu-mirrors.txt
          updated+=("Ubuntu mirrors")
        fi

        if ! git diff --exit-code -- docker-domains/docker-domains.txt > /dev/null 2>&1; then
          git add docker-domains/docker-domains.txt
          updated+=("Docker domains")
        fi

        if [ ${#updated[@]} -eq 0 ]; then
          echo "No changes to commit"
        else
          msg="Update EDL: $(IFS=', '; echo "${updated[*]}")"
          git commit -m "$msg"
          if ! git push -u origin main; then
            git pull --rebase origin main
            git push -u origin main
          fi
        fi
