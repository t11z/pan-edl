name: Hourly update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-edls:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt pytest

    - name: Run validator test suite
      run: python -m pytest tests/

    - name: Configure git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: Run all EDL generators
      run: |
        export PYTHONPATH=.
        mkdir -p .ci-artifacts/generator-logs
        : > .ci-artifacts/failed_generators.txt
        for dir in */; do
          slug="${dir%/}"
          script="${dir}${slug}.py"
          if [ -f "$script" ]; then
            echo "::group::Running $script"
            if ! python "$script" 2> ".ci-artifacts/generator-logs/$slug.err"; then
              echo "$slug" >> .ci-artifacts/failed_generators.txt
              echo "::warning::Generator failed: $slug (existing output preserved)"
              cat ".ci-artifacts/generator-logs/$slug.err"
            else
              # Generator succeeded — discard empty stderr log to keep the artifact small.
              rm -f ".ci-artifacts/generator-logs/$slug.err"
            fi
            echo "::endgroup::"
          fi
        done

    - name: Upload failure context for auto-issue bot
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: generator-failures
        path: .ci-artifacts/
        retention-days: 7
        if-no-files-found: ignore

    - name: Write per-list status badges
      if: always()
      run: |
        # Per-slug shields.io endpoint badges. Files are byte-stable when
        # status+count are unchanged, so a no-op run produces no badge diff
        # and the commit step doesn't fire on badge files alone.
        mkdir -p .badges
        failed_file=.ci-artifacts/failed_generators.txt
        for dir in */; do
          slug="${dir%/}"
          script="${dir}${slug}.py"
          [ -f "$script" ] || continue
          txt="${dir}${slug}.txt"

          if [ -f "$failed_file" ] && grep -qx "$slug" "$failed_file"; then
            message="failing"
            color="red"
          elif [ -f "$txt" ]; then
            count=$(wc -l < "$txt" | tr -d ' ')
            message="${count} entries"
            color="brightgreen"
          else
            message="unknown"
            color="lightgrey"
          fi

          printf '{"schemaVersion":1,"label":"%s","message":"%s","color":"%s"}\n' \
            "$slug" "$message" "$color" > ".badges/$slug.json"
        done

    - name: Commit and push changed EDL files
      run: |
        # Stage all .txt files (covers both modified-tracked and new-untracked)
        # plus the status badges. Generators that failed earlier left their
        # .txt untouched, so they don't appear here and the last known-good
        # content stays on main. The badge JSON for those slugs *does* appear
        # in the diff when status flips between passing↔failing.
        git add -- '*/*.txt' .badges/

        updated=()
        for txt in $(git diff --cached --name-only -- '*/*.txt'); do
          updated+=("$(dirname "$txt")")
        done

        if [ ${#updated[@]} -eq 0 ]; then
          echo "No changes to commit"
          exit 0
        fi

        msg="Update EDL: $(IFS=', '; echo "${updated[*]}")"
        git commit -m "$msg"
        if ! git push -u origin "${GITHUB_REF_NAME}"; then
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push -u origin "${GITHUB_REF_NAME}"
        fi

    - name: Fail workflow if any generator failed
      if: always()
      run: |
        if [ -s .ci-artifacts/failed_generators.txt ]; then
          echo "::error::Generators that failed this run (existing .txt preserved):"
          sed 's/^/  - /' .ci-artifacts/failed_generators.txt
          exit 1
        fi
        echo "All generators succeeded."
