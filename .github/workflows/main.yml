name: Hourly update
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-edls:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt pytest

    - name: Run validator test suite
      run: python -m pytest tests/

    - name: Configure git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

    - name: Run all EDL generators
      run: |
        export PYTHONPATH=.
        failed=()
        for dir in */; do
          slug="${dir%/}"
          script="${dir}${slug}.py"
          if [ -f "$script" ]; then
            echo "::group::Running $script"
            if ! python "$script"; then
              failed+=("$slug")
            fi
            echo "::endgroup::"
          fi
        done
        if [ ${#failed[@]} -gt 0 ]; then
          echo "::error::Generators failed: ${failed[*]}"
          exit 1
        fi

    - name: Commit and push changed EDL files
      run: |
        updated=()
        for txt in $(git diff --name-only -- '*/*.txt'); do
          slug="$(dirname "$txt")"
          git add "$txt"
          updated+=("$slug")
        done

        if [ ${#updated[@]} -eq 0 ]; then
          echo "No changes to commit"
          exit 0
        fi

        msg="Update EDL: $(IFS=', '; echo "${updated[*]}")"
        git commit -m "$msg"
        if ! git push -u origin "${GITHUB_REF_NAME}"; then
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push -u origin "${GITHUB_REF_NAME}"
        fi
